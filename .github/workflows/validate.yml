name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements/base.txt

      - name: Compile application sources
        run: python -m compileall app alembic

      - name: Run test suite
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Check public release boundaries
        run: python tools/check_public_release.py
